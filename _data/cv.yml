  image: /assets/img/personal_photo.png
  summary: AI engineer and ML researcher focused on LLM systems, generative AI, trustworthy machine learning, computer vision, backend architecture, and research engineering.

  social_networks:
    - network: GitHub
      username: askari1375
    - network: LinkedIn
