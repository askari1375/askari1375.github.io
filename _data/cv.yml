  sections:
    Experience:
      - company: Klynt AG
        position: AI Engineer
        location: Zurich, Switzerland
        start_date: 2025
        end_date: present
        summary: Building an AI copilot platform for M&A advisory workflows, with emphasis on document understanding, RAG, knowledge graphs, agentic workflows, and modular backend services.
        highlights:
          - Designed and implemented RAG pipelines for document-level reasoning and question answering.
          - Worked on hybrid retrieval architectures combining vector search, Qdrant, knowledge graph construction, and Cypher-style querying.
          - Built LangGraph-based agentic workflows with fan-out, merge, dynamic routing, subgraphs, and Langfuse observability.
          - Contributed to FastAPI-based backend architecture, async job tracking, reusable service abstractions, Docker workflows, and CI pipelines.

      - company: Disney Research Studios Zurich
        position: ML Researcher Intern
        location: Zurich, Switzerland
        start_date: 2024-10
        end_date: 2025-10
        summary: Worked on diffusion models and trustworthy generative AI across synthetic pretraining, large-scale data preparation, and semantic watermarking robustness.
        highlights:
          - Contributed to synthetic and semi-synthetic pretraining research for diffusion models and representation learning.
          - Co-authored work on stylized structural patterns for improved neural network pretraining.
          - Built and evaluated reproducible diffusion experiments using metrics such as FID, KID, DINO/ViT features, and attention-map similarity.
          - Worked on data preparation pipelines for training a large image generation model, including image quality assessment and training-readiness checks.
          - Developed ideas and experiments around semantic watermarking, localized diffusion edits, robustness benchmarking, and watermark removal attacks.

      - company: AI Startup in Healthcare (Risklick)
        position: Data Scientist Intern
        location: Bern, Switzerland
        start_date: 2024-03
        end_date: 2024-10
        summary: Built LLM-based document understanding workflows and production software features for clinical-trial and medical document analysis.
        highlights:
          - Built RAG pipelines with evidence-backed responses and source-document references to reduce hallucination risk.
          - Designed a cost-aware LLM feature for checking conflicts between related documents.
          - Developed a high-accuracy HTML track-changes algorithm using tree/graph representations and structured edit operations.
          - Transitioned into the software engineering team and shipped production features using Next.js, React, TypeScript, FastAPI, Prisma, and PostgreSQL.

      - company: VITA Lab, EPFL
        position: Research Assistant
        location: Lausanne, Switzerland
        start_date: 2023-07
        end_date: 2023-12
        summary: Worked on certified robustness for human trajectory prediction, resulting in a CVPR 2025 paper.
        highlights:
          - Contributed to a certification framework for trajectory prediction using randomized smoothing.
          - Helped integrate a diffusion-based denoiser to improve certified bounds while preserving accuracy.
          - Contributed to certified metrics including Certified-ADE, Certified-FDE, Certified Collision Rate, ABD, and FBD.
          - Evaluated robustness across trajectory prediction models and Trajnet++ benchmarks.

      - company: CREATE Lab, EPFL
        position: Visiting Student Intern
        location: Lausanne, Switzerland
        start_date: 2021-07
        end_date: 2021-09
        summary: Worked on machine learning and sensing projects for soft robotics under data-limited and noisy real-world conditions.
        highlights:
          - Built a synchronized data collection pipeline pairing sensor glove readings with MediaPipe hand-pose ground truth.
          - Proposed and implemented a paired-camera strategy for soft-robot trunk shape estimation under limited labeled data.
          - Explored simulation-based pretraining and autoencoder-style models for cross-view prediction.

