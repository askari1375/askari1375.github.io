    Projects:
      - name: QGraph
        summary: Production-oriented personal AI engineering project for structured text analysis, combining Django/DRF, Next.js, search workflows, segmentation, retrieval, and planned knowledge-graph reasoning.
        highlights:
          - Django backend with accounts, canonical text data, segmentation, and search domains.
          - Versioned segmentation model with provenance, ownership, transactional activation, and database constraints.
          - Next.js frontend with typed API integration, CSRF/JWT handling, polling flows, RTL support, and tests.
          - Production-readiness work including Docker, Gunicorn, Nginx, systemd assets, Sentry, request-ID logging, and documentation.

